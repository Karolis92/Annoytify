plugins {
  id 'com.android.library'
  id 'expo-module-gradle-plugin'
}

group = 'expo.modules.onboot'
version = '0.7.10'

android {
  namespace "expo.modules.onboot"
  defaultConfig {
    versionCode 1
    versionName "0.7.10"
  }
  lintOptions {
    abortOnError false
  }
}

dependencies {
  compileOnly "com.facebook.react:react-android"
}
