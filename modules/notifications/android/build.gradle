plugins {
  id 'com.android.library'
  id 'expo-module-gradle-plugin'
}

group = 'app.annoytify.modules.notifications'
version = '0.7.10'

android {
  namespace "app.annoytify.modules.notifications"
  defaultConfig {
    versionCode 1
    versionName "0.7.10"
  }
  lintOptions {
    abortOnError false
  }
}

dependencies {
  implementation "androidx.core:core-ktx:1.17.0"
  compileOnly "com.facebook.react:react-android"
  testImplementation "junit:junit:4.13.2"
}
